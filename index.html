<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu</title>

    <!-- Favicon -->
    <link rel="icon" href="https://sman1bolaang.sch.id/wp-content/uploads/2026/01/Logo1-2.webp">

    <style>
        /* Reset dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* Container utama */
        .iframe-container {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Iframe fullscreen */
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Loader (opsional biar lebih profesional) */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            z-index: 9999;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader" class="loader">
        ⏳ Memuat halaman buku...
    </div>

    <!-- Iframe -->
    <div class="iframe-container">
        <iframe 
            id="app"
            src="https://script.google.com/macros/s/AKfycbwGrRsesQATeRoY62_QJwNYJtlVISsdGTiL9cLC2MugqjShgntbtDCQvFmwi4ZAZB2xbw/exec"
            scrolling="no"
            allowfullscreen="true"
            webkitallowfullscreen="true"
            onload="hideLoader()">
        </iframe>
    </div>

    <script>
        // Hilangkan loader saat iframe selesai load
        function hideLoader() {
            document.getElementById("loader").classList.add("hidden");
        }

        // Anti klik kanan (opsional untuk ujian)
        document.addEventListener("contextmenu", function(e) {
            e.preventDefault();
        });

        // Anti inspect sederhana
        document.addEventListener("keydown", function(e) {
            if (e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && e.key === "I") || 
                (e.ctrlKey && e.key === "U")) {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
